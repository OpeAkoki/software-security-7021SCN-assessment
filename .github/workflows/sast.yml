name: SAST - Semgrep and Bandit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install semgrep bandit

      - name: Semgrep scan - vulnerable webapp (findings documented)
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/flask \
            --config p/secrets \
            --config task-c-testing/custom-rules.yaml \
            --json --output semgrep-vulnerable.json \
            task-c-testing/webapp/app.py || true

      - name: Semgrep scan - fixed webapp (pass gate)
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/flask \
            --config p/secrets \
            --config task-c-testing/custom-rules.yaml \
            --json --output semgrep-fixed.json \
            --error \
            task-c-testing/webapp/app_fixed.py

      - name: Bandit scan - vulnerable webapp
        run: |
          bandit -f json -o bandit-vulnerable.json \
            task-c-testing/webapp/app.py || true

      - name: Bandit scan - fixed webapp
        run: |
          bandit -f json -o bandit-fixed.json \
            task-c-testing/webapp/app_fixed.py || true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            semgrep-vulnerable.json
            semgrep-fixed.json
            bandit-vulnerable.json
            bandit-fixed.json
