name: SAST - Semgrep and Bandit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install semgrep bandit

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/flask \
            --config p/secrets \
            --json --output semgrep.json \
            --error .

      - name: Bandit scan
        run: bandit -r . -x ./tests -f json -o bandit.json || true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            semgrep.json
            bandit.json
